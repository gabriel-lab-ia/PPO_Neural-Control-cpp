<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Orbital Neural Control CPP hero banner</title>
  <desc id="desc">Premium orbital autonomy hero with balanced typography, compact capability chips, and a secondary telemetry panel.</desc>

  <defs>
    <linearGradient id="bg" x1="80" y1="20" x2="1520" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080E17"/>
      <stop offset="0.55" stop-color="#0A1625"/>
      <stop offset="1" stop-color="#08111C"/>
    </linearGradient>

    <radialGradient id="softGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(860 460) rotate(90) scale(170 780)">
      <stop stop-color="#2A7BFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#2A7BFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="chipFill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#101D2D"/>
      <stop offset="1" stop-color="#122338"/>
    </linearGradient>

    <linearGradient id="panelFill" x1="1088" y1="78" x2="1488" y2="328" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101B2B"/>
      <stop offset="1" stop-color="#0B1421"/>
    </linearGradient>

    <linearGradient id="lineA" x1="1122" y1="174" x2="1450" y2="174" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4B90FF"/>
      <stop offset="1" stop-color="#56E0C0"/>
    </linearGradient>

    <linearGradient id="lineB" x1="1122" y1="252" x2="1450" y2="252" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5D8EFF"/>
      <stop offset="1" stop-color="#9E7AFF"/>
    </linearGradient>
  </defs>

  <!-- Outer frame -->
  <rect x="8" y="8" width="1584" height="404" rx="22" fill="url(#bg)" stroke="#25364D" stroke-width="1.4"/>
  <ellipse cx="820" cy="426" rx="730" ry="156" fill="url(#softGlow)"/>

  <!-- Subtle guides -->
  <g opacity="0.2" stroke="#203347" stroke-width="1">
    <path d="M96 94H1504"/>
    <path d="M96 138H1504"/>
    <path d="M96 182H1504"/>
    <path d="M96 226H1504"/>
    <path d="M96 270H1504"/>
    <path d="M96 314H1504"/>
  </g>

  <!-- Left content column (safe width) -->
  <text x="96" y="86" fill="#4DDEAE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.2">
    ORBITAL AUTONOMY + RL SYSTEMS ENGINEERING
  </text>

  <text x="96" y="160" fill="#EDF5FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="60" font-weight="700">
    Orbital Neural Control CPP
  </text>

  <text fill="#AFC4DE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="500">
    <tspan x="96" y="208">C++20 platform for orbital simulation, PPO-based control, telemetry tracking,</tspan>
    <tspan x="96" y="240">and reproducible experiment workflows.</tspan>
  </text>

  <!-- Capability chips (compact, no collision) -->
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#E7F1FE">
    <rect x="96" y="278" width="216" height="42" rx="12" fill="url(#chipFill)" stroke="#345375"/>
    <text x="204" y="305" text-anchor="middle">Orbital Simulation</text>

    <rect x="326" y="278" width="176" height="42" rx="12" fill="url(#chipFill)" stroke="#345375"/>
    <text x="414" y="305" text-anchor="middle">PPO Control</text>

    <rect x="516" y="278" width="154" height="42" rx="12" fill="url(#chipFill)" stroke="#345375"/>
    <text x="593" y="305" text-anchor="middle">Telemetry</text>

    <rect x="684" y="278" width="274" height="42" rx="12" fill="url(#chipFill)" stroke="#345375"/>
    <text x="821" y="305" text-anchor="middle">Reproducible Benchmarks</text>
  </g>

  <!-- Right support panel (smaller + secondary) -->
  <g>
    <rect x="1088" y="78" width="400" height="250" rx="16" fill="url(#panelFill)" stroke="#294059"/>
    <text x="1122" y="112" fill="#E3EEFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700">
      Telemetry Snapshot
    </text>

    <text x="1122" y="142" fill="#A4BCD9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">
      Policy cadence and mission residual trends
    </text>

    <rect x="1122" y="160" width="330" height="50" rx="10" fill="#0B1625" stroke="#2B4663"/>
    <path d="M1140 190C1170 176 1208 170 1242 178C1276 186 1308 202 1342 198C1376 194 1410 176 1444 166" stroke="url(#lineA)" stroke-width="2.8" stroke-linecap="round"/>

    <rect x="1122" y="238" width="330" height="50" rx="10" fill="#0B1625" stroke="#2B4663"/>
    <path d="M1140 266C1172 272 1206 262 1240 254C1274 246 1308 248 1342 258C1374 268 1408 270 1444 256" stroke="url(#lineB)" stroke-width="2.8" stroke-linecap="round"/>

    <text x="1122" y="308" fill="#8EA9C8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">
      CPU-first | Train • Eval • Benchmark
    </text>
  </g>
</svg>
