    <rect x="214" y="32" width="118" height="40" rx="9" fill="url(#gIndigo)"/>
    <text x="273" y="58" text-anchor="middle">C++ 20</text>

    <rect x="346" y="32" width="286" height="40" rx="9" fill="url(#gCyan)"/>
