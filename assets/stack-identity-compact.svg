<svg width="1600" height="470" viewBox="0 0 1600 470" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Stack and Engineering Identity Key Value Tags</title>
  <desc id="desc">Linux First, C++ 20, Reinforcement Learning PPO, Backend LibTorch CPU, Tracking SQLite, Simulation Orbital Mission Direction, Telemetry Run Episode Event, Benchmarking Reproducible, UML Architecture Discipline, Systems Engineering, CI failing, CI Smoke Benchmark, Optional MuJoCo, Future TensorRT Path, Baseline CPU Only.</desc>
