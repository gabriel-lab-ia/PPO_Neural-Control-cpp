<svg width="1320" height="96" viewBox="0 0 1320 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Interface and Experience Chips</title>
  <desc id="desc">UX-Oriented Visualization, Mission Replay UI, CLI Tooling, Structured Experiment Outputs</desc>
  <defs>
    <linearGradient id="uiPanel" x1="0" y1="0" x2="1320" y2="96" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1B1206"/>
      <stop offset="1" stop-color="#23170A"/>
    </linearGradient>
    <linearGradient id="uiChip" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#4B2F12"/>
      <stop offset="1" stop-color="#603915"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="1318" height="94" rx="18" fill="url(#uiPanel)" stroke="#8D6030" stroke-opacity="0.68"/>

  <rect x="26" y="24" width="332" height="48" rx="14" fill="url(#uiChip)" stroke="#C98946"/>
  <text x="192" y="53" text-anchor="middle" fill="#FFE9D1" font-family="Inter, Segoe UI, Arial" font-size="19" font-weight="600">UX-Oriented Visualization</text>

  <rect x="378" y="24" width="250" height="48" rx="14" fill="url(#uiChip)" stroke="#C98946"/>
  <text x="503" y="53" text-anchor="middle" fill="#FFE9D1" font-family="Inter, Segoe UI, Arial" font-size="19" font-weight="600">Mission Replay UI</text>

  <rect x="648" y="24" width="182" height="48" rx="14" fill="url(#uiChip)" stroke="#C98946"/>
  <text x="739" y="53" text-anchor="middle" fill="#FFE9D1" font-family="Inter, Segoe UI, Arial" font-size="19" font-weight="600">CLI Tooling</text>

  <rect x="850" y="24" width="444" height="48" rx="14" fill="url(#uiChip)" stroke="#C98946"/>
  <text x="1072" y="53" text-anchor="middle" fill="#FFE9D1" font-family="Inter, Segoe UI, Arial" font-size="19" font-weight="600">Structured Experiment Outputs</text>
</svg>
