services:
  mlflow:
    image: python:3.12-slim
    working_dir: /workspace
    command: >
      bash -lc "pip install --no-cache-dir mlflow==2.17.0 &&
      mlflow server
      --backend-store-uri sqlite:////workspace/artifacts/mlflow/mlflow.db
      --default-artifact-root /workspace/artifacts/mlflow-artifacts
      --host 0.0.0.0 --port 5000"
    volumes:
      - ./artifacts:/workspace/artifacts
    ports:
      - "5000:5000"

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      ORBITAL_BACKEND_PORT: "8080"
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    environment:
      VITE_BACKEND_HTTP: "http://localhost:8080"
      VITE_BACKEND_WS: "ws://localhost:8080"
    ports:
      - "3000:3000"
    depends_on:
      - backend

  cpp-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.cpp-dev
    image: orbital-neural-control-cpp-cpp-dev:latest
    working_dir: /workspace
    volumes:
      - ./artifacts:/workspace/artifacts
    command: ["bash", "-lc", "./build/nmc benchmark --quick --name compose_smoke && tail -f /dev/null"]

  training:
    build:
      context: .
      dockerfile: docker/Dockerfile.cpp-dev
    image: orbital-neural-control-cpp-cpp-dev:latest
    working_dir: /workspace
    command:
      [
        "python3",
        "mlops/train_with_mlflow.py",
        "--tracking-uri",
        "http://mlflow:5000",
        "--experiment",
        "orbital_ppo",
        "--run-id",
        "compose_train",
        "--seed",
        "7",
        "--updates",
        "30",
        "--num-envs",
        "16",
        "--env",
        "point_mass",
        "--binary",
        "./build/nmc",
        "--export-onnx"
      ]
    volumes:
      - ./artifacts:/workspace/artifacts
    depends_on:
      - mlflow

  redis:
    image: redis:7-alpine
    profiles: ["cache"]
    ports:
      - "6379:6379"
