name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

env:
  CMAKE_GENERATOR: Ninja

jobs:
  baseline-vcpkg:
    name: baseline-vcpkg
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build curl zip unzip tar pkg-config libsqlite3-dev python3

      - name: Setup CMake + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.28.0"
          ninjaVersion: "latest"

      - name: Setup vcpkg
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$RUNNER_TEMP/vcpkg"
          "$RUNNER_TEMP/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$RUNNER_TEMP/vcpkg" >> "$GITHUB_ENV"

      - name: Configure
        run: |
          set -euxo pipefail
          cmake --preset ci \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_FEATURE_FLAGS=manifests \
            -DNMC_USE_LEGACY_VENDOR_DEPS=OFF \
            -DNMC_ENABLE_MUJOCO=OFF \
            -DNMC_BUILD_ORBITAL_BACKEND=OFF

      - name: Build
        run: |
          set -euxo pipefail
          cmake --build --preset build-ci --verbose
          test -x build-ci/nmc
          test -x build-ci/nmc_inference_parity_test

      - name: Run tests
        run: |
          set -euxo pipefail
          ctest --test-dir build-ci --output-on-failure --verbose --no-tests=error \
            -R "nmc_smoke_benchmark|nmc_inference_parity"

      - name: Validate artifacts and benchmark regression
        run: |
          set -euxo pipefail
          test -f artifacts/benchmarks/latest.json
          test -f artifacts/latest/manifest.json
          test -f artifacts/latest/checkpoint.pt
          test -f artifacts/latest/checkpoint.meta
          test -f artifacts/experiments.sqlite

          python3 - <<'PY'
          import json
          from pathlib import Path

          bench = json.loads(Path("artifacts/benchmarks/latest.json").read_text(encoding="utf-8"))
          train_return = float(bench.get("train", {}).get("final_avg_episode_return", 0.0))
          eval_return = float(bench.get("eval", {}).get("avg_episode_return", 0.0))

          assert train_return > 0.5, f"train regression detected: {train_return}"
          assert eval_return > 5.0, f"eval regression detected: {eval_return}"
          PY

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smoke-artifacts
          path: |
            artifacts/benchmarks/latest.json
            artifacts/benchmarks/latest.csv
            artifacts/latest/manifest.json
            artifacts/latest/checkpoint.pt
            artifacts/latest/checkpoint.meta
            artifacts/experiments.sqlite

  asan-ubsan:
    name: asan-ubsan
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build curl zip unzip tar pkg-config libsqlite3-dev

      - name: Setup vcpkg
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$RUNNER_TEMP/vcpkg"
          "$RUNNER_TEMP/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$RUNNER_TEMP/vcpkg" >> "$GITHUB_ENV"

      - name: Configure debug sanitized
        run: |
          set -euxo pipefail
          cmake --preset debug-sanitized \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_FEATURE_FLAGS=manifests \
            -DNMC_USE_LEGACY_VENDOR_DEPS=OFF

      - name: Build and smoke
        run: |
          set -euxo pipefail
          cmake --build --preset build-debug --verbose
          ./build/nmc benchmark --quick --name asan_smoke --seed 7

  tsan:
    name: tsan
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build curl zip unzip tar pkg-config libsqlite3-dev

      - name: Setup vcpkg
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$RUNNER_TEMP/vcpkg"
          "$RUNNER_TEMP/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$RUNNER_TEMP/vcpkg" >> "$GITHUB_ENV"

      - name: Configure debug tsan
        run: |
          set -euxo pipefail
          cmake --preset debug-tsan \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_FEATURE_FLAGS=manifests \
            -DNMC_USE_LEGACY_VENDOR_DEPS=OFF

      - name: Build and smoke
        run: |
          set -euxo pipefail
          cmake --build --preset build-debug-tsan --verbose
          ./build/nmc benchmark --quick --name tsan_smoke --seed 7

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build curl zip unzip tar pkg-config libsqlite3-dev gcovr

      - name: Setup vcpkg
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$RUNNER_TEMP/vcpkg"
          "$RUNNER_TEMP/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$RUNNER_TEMP/vcpkg" >> "$GITHUB_ENV"

      - name: Configure debug coverage
        run: |
          set -euxo pipefail
          cmake --preset debug-coverage \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_FEATURE_FLAGS=manifests \
            -DNMC_USE_LEGACY_VENDOR_DEPS=OFF

      - name: Build and run tests
        run: |
          set -euxo pipefail
          cmake --build --preset build-debug-coverage --verbose
          ctest --test-dir build --output-on-failure --verbose --no-tests=error \
            -R "nmc_smoke_benchmark|nmc_inference_parity"

      - name: Generate coverage report
        run: |
          set -euxo pipefail
          gcovr -r . --exclude 'build.*' --exclude 'lib/.*' --xml-pretty -o coverage.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  frontend-contract:
    name: frontend-contract
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend typecheck and build
        working-directory: frontend
        run: |
          set -euxo pipefail
          npm run typecheck
          npm run build

      - name: Validate OpenAPI required endpoints
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path

          spec = Path("docs/openapi/orbital-api.yaml").read_text(encoding="utf-8")
          required_paths = [
              "/health", "/version", "/runs", "/runs/{runId}", "/runs/{runId}/summary",
              "/runs/{runId}/telemetry", "/runs/{runId}/telemetry/window", "/runs/{runId}/events",
              "/runs/{runId}/artifacts", "/runs/{runId}/replay", "/benchmarks", "/benchmarks/{benchmarkId}",
              "/train/jobs", "/eval/jobs", "/benchmark/jobs", "/jobs/{jobId}", "/config/presets",
          ]
          missing = [path for path in required_paths if path + ":" not in spec]
          assert not missing, f"Missing OpenAPI paths: {missing}"
          PY

  core-arm64-cross:
    name: core-arm64-cross
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cross-compiler toolchain
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Configure core for ARM64
        run: |
          set -euxo pipefail
          cmake -S core -B build-core-arm64 -G Ninja \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++

      - name: Build core targets
        run: |
          set -euxo pipefail
          cmake --build build-core-arm64 --verbose
          file build-core-arm64/orbital_core_tests | tee /tmp/orbital_core_tests.file
          grep -E "aarch64|ARM aarch64" /tmp/orbital_core_tests.file
