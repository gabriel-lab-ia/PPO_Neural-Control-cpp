name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y unzip wget libsqlite3-dev

      - name: Download LibTorch CPU
        run: bash tools/setup_libtorch_cpu.sh

      - name: Configure baseline build
        run: cmake --preset dev -DNMC_TORCH_ROOT=$GITHUB_WORKSPACE/lib/libtorch

      - name: Build
        run: cmake --build --preset build

      - name: Run smoke benchmark test
        run: ctest --test-dir build --output-on-failure -R nmc_smoke_benchmark

      - name: Validate generated artifacts
        run: |
          test -f artifacts/benchmarks/latest.json
          test -f artifacts/latest/manifest.json
          test -f artifacts/latest/checkpoint.pt
