name: Bug report
description: Report a reproducible defect in runtime, API, frontend, or tooling.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear and objective description of the issue.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Exact commands and sequence to reproduce from repository root.
      placeholder: |
        1. cmake --preset dev
        2. cmake --build --preset build
        3. ./build/nmc benchmark --quick --name repro --seed 7
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Artifacts
      description: Include relevant stderr, manifest paths, benchmark JSON, or screenshots.

  - type: input
    id: commit
    attributes:
      label: Commit / Branch
      placeholder: main @ abc1234
